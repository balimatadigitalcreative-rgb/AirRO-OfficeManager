# AirRO Water — Nginx site config.
# Serves the static frontend at / and proxies /api/ to the Node backend.
# Put this at /etc/nginx/sites-available/airro and symlink into sites-enabled.
# Replace yourdomain.com and the root path, then: sudo nginx -t && sudo systemctl reload nginx
# HTTPS is added automatically by certbot (step 7 in DEPLOY.md).

server {
    listen 80;
    server_name airrooffice.com www.airrooffice.com;

    # Folder that contains the HTML/JS/CSS (the project root you uploaded).
    root /var/www/airrooffice;
    index index.html;

    # Shared-state blobs (PUT /api/v1/state/*) grow with the data and can exceed
    # Nginx's 1MB default → 413 and the save is lost. The Node body limit is 12MB,
    # so allow a bit more here and let the app be the real cap.
    client_max_body_size 20m;

    # Frontend static files. index.html redirects to the Daily Finance Manager.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE realtime stream — MUST come before the generic /api/ block (a more specific
    # location wins). Disable buffering so events flush instantly, keep the socket
    # open for a long time, and use HTTP/1.1 keep-alive (no "Connection: close").
    location = /api/v1/events {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";     # keep the upstream connection alive
        proxy_buffering off;                        # flush each event immediately
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;                   # long-lived stream (1h) + heartbeats
        proxy_send_timeout 3600s;
    }

    # API → Node backend (pm2, listening on 127.0.0.1:4000).
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Never serve backend source, the database, secrets, or VCS metadata as static files.
    # (Verify after deploy: https://airrooffice.com/server/.env and /server/prisma/dev.db → 403/404.)
    location ~ /(server|deploy)/  { deny all; return 404; }
    location ~* \.(db|env|db-journal|db-wal|db-shm)$ { deny all; return 404; }
    location ~ /\.(git|env)       { deny all; return 404; }   # /.git, /.env, dotfiles
}
