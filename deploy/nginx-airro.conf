# AirRO Water — FULL production Nginx site config (HTTP + HTTPS).
#
#   ⚠️  17 Jul outage: this file used to contain ONLY a `listen 80` block, with a
#   comment saying "certbot adds HTTPS". Copying it over the live config therefore
#   DELETED certbot's :443 server block — Nginx came back listening on :80 only and
#   the site was unreachable (ERR_TIMED_OUT) until certbot was re-run. The repo copy
#   now ships the COMPLETE config, TLS included, so applying it is non-destructive.
#
#   NEVER `cp` this by hand. Use:  sudo bash deploy/apply-nginx.sh
#   (it backs up, runs `nginx -t`, reloads only on success, and restores on failure).
#
# Certificates are issued/renewed by certbot:
#   sudo certbot --nginx -d airrooffice.com -d www.airrooffice.com
# The paths below are certbot's standard layout. If your live config differs, diff it
# first (apply-nginx.sh shows you) — the live file is the source of truth for TLS.

# ── HTTP :80 — ACME renewal + redirect everything else to HTTPS ────────────────
server {
    listen 80;
    listen [::]:80;
    server_name airrooffice.com www.airrooffice.com;

    # Let's Encrypt http-01 challenge must stay reachable over plain HTTP or renewal
    # fails and the cert silently expires. Keep this ABOVE the redirect.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS :443 — the real site ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name airrooffice.com www.airrooffice.com;

    # HTTP/2 is version-sensitive: nginx < 1.25 wants `listen 443 ssl http2;`, while
    # 1.25+ wants a separate `http2 on;` (the old form warns). Left off so this config
    # applies cleanly on any version. To enable, check `nginx -v` and add the right one.

    # managed by Certbot — do not hand-edit; re-run certbot if these paths change.
    ssl_certificate     /etc/letsencrypt/live/airrooffice.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airrooffice.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Folder that contains the HTML/JS/CSS (the project root you uploaded).
    root /var/www/airrooffice;
    index index.html;

    # Shared-state blobs (PUT /api/v1/state/*) grow with the data and can exceed
    # Nginx's 1MB default → 413 and the save is lost. The Node body limit is 12MB,
    # so allow a bit more here and let the app be the real cap.
    client_max_body_size 20m;

    # .webmanifest is NOT in Nginx's default mime.types. Set it with `default_type` in an
    # EXACT location — NEVER a `types { }` block here: a types block REPLACES the entire
    # inherited mime map (it does not extend it), which wipes .html→text/html, .js, .css,
    # .png … so every page downloads as octet-stream instead of rendering. (That was the
    # 18 Jul outage — see DEPLOY.md.) A scoped default_type touches only this one URL.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # LEGACY URL → clean URL. The app used to live at this long filename; keep old
    # bookmarks working. The #hash (the app's router state) is preserved automatically:
    # fragments are never sent to the server, and browsers re-apply them to the target.
    location = "/AirRO Water - Daily Finance Manager.html" { return 301 /; }

    # Frontend static files. index.html IS the app now (no redirect hop).
    # try_files keeps the hash router working on refresh of any #screen.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, or staff keep booting old code after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # Vendored libraries (React, ReactDOM, SheetJS) + icons: same-origin, immutable,
    # and cache-busted by ?v=lNN, so they can be cached hard. NO types override — the
    # inherited mime.types already maps .js → application/javascript; a types block here
    # would wipe that map for this location and break the boot.
    location /vendor/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }
    location /icons/ {
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # SSE realtime stream — MUST come before the generic /api/ block (a more specific
    # location wins). Disable buffering so events flush instantly, keep the socket
    # open for a long time, and use HTTP/1.1 keep-alive (no "Connection: close").
    location = /api/v1/events {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";     # keep the upstream connection alive
        proxy_buffering off;                        # flush each event immediately
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;                   # long-lived stream (1h) + heartbeats
        proxy_send_timeout 3600s;
    }

    # API → Node backend (pm2, listening on 127.0.0.1:4000).
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Never serve backend source, the database, secrets, or VCS metadata as static files.
    # (Verify after deploy: https://airrooffice.com/server/.env and /server/prisma/prod.db → 403/404.)
    location ~ /(server|deploy)/  { deny all; return 404; }
    location ~* \.(db|env|db-journal|db-wal|db-shm)$ { deny all; return 404; }
    location ~ /\.(git|env)       { deny all; return 404; }   # /.git, /.env, dotfiles
}
