# AirRO Water — FIRST-INSTALL Nginx config (HTTP only). Used ONCE, by deploy.sh.
#
# Chicken-and-egg: the real config (nginx-airro.conf) references certificates under
# /etc/letsencrypt, which do not exist until certbot has run — and certbot needs a
# working :80 site to validate the domain before it can issue them. So a fresh box
# starts here, on plain HTTP.
#
#   deploy.sh  →  this file  →  certbot --nginx  →  sudo bash deploy/apply-nginx.sh
#                                                   (installs the full config)
#
# ⚠️  NEVER apply this over a live site that already has HTTPS — it has no :443 block,
# so it would take the site off the internet (that is the 17 Jul outage). apply-nginx.sh
# refuses exactly this; deploy.sh refuses to overwrite an existing config at all.

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/airro;
    index index.html;

    client_max_body_size 20m;

    # Let's Encrypt http-01 challenge (certbot --nginx handles this itself, but an
    # explicit webroot location makes renewal robust either way).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    types { application/manifest+json  webmanifest; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Secrets/DB/source must never be served, even during first install.
    location ~ /(server|deploy)/  { deny all; return 404; }
    location ~* \.(db|env|db-journal|db-wal|db-shm)$ { deny all; return 404; }
    location ~ /\.(git|env)       { deny all; return 404; }
}
