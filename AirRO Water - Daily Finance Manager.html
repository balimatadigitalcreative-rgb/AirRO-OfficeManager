<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirRO Office</title>
  <link rel="icon" href="/icons/favicon.ico" sizes="any" />
  <meta name="robots" content="noindex" />
  <!-- LEGACY URL. The app now lives at https://airrooffice.com/ — this file only exists
       so old bookmarks and pinned tabs keep working. Nginx also 301s this path to /,
       so this page is normally never rendered; it's the belt-and-braces fallback for
       anyone opening the file directly.

       The redirect is done in JS (not meta-refresh) so the #hash — which is the app's
       router state (#distribusi, #payroll, …) — survives. A meta-refresh to "/" would
       silently drop it and dump the user on the default screen. -->
  <script>
    (function () {
      try { location.replace('/' + (location.hash || '')); }
      catch (e) { location.href = '/'; }
    })();
  </script>
</head>
<body>
  <p style="font:14px system-ui,sans-serif;padding:24px;color:#1C2B33">
    AirRO Office has moved to <a href="/">airrooffice.com</a> — redirecting…
  </p>
</body>
</html>
